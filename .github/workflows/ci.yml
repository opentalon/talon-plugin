name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        # v2.x is built with Go 1.25+ — required because go.mod declares
        # `go 1.25`. The action's `version: latest` resolves to v1.x as of
        # writing, which is built with Go 1.24 and rejects the newer go.mod.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.7.2
          verify: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -race -count=1 -v ./...
