name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        # golangci-lint v2.x is built with Go 1.25+ — required because
        # go.mod declares `go 1.25`. golangci-lint-action@v7 is the
        # minimum that supports v2; v6 hard-rejects v2 version strings.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.2
          verify: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -race -count=1 -v ./...
